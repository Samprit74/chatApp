<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App | Modern UI</title>

    <link href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css">

    <script src="/webjars/jquery/3.7.1/jquery.min.js"></script>
    <script src="/webjars/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="/webjars/stomp-websocket/2.3.4/stomp.min.js"></script>

    <script src="/js/app.js"></script>
</head>

<body>

<h2 class="text-center mt-3 app-title">✨ Chat App</h2>

<!-- ENTRY SCREEN -->
<div id="entry-screen" class="login-page d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="glass-card p-4">

                    <h4 class="text-center mb-4">Welcome</h4>

                    <!-- INPUTS -->
                    <input type="text"
                           id="name-value"
                           placeholder="Enter your name"
                           class="form-control mb-3"/>

                    <input type="number"
                           id="room-id-input"
                           placeholder="Enter Room ID (optional)"
                           class="form-control mb-4"/>

                    <!-- ACTION BUTTONS -->
                    <button id="create-room" class="btn join-btn w-100 mb-3">
                        Create New Room
                    </button>

                    <button id="join-room" class="btn join-btn w-100">
                        Join Room
                    </button>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- CHAT APP -->
<div id="chat-room" class="d-none">

    <div class="chat-wrapper">

        <!-- SIDEBAR -->
        <div class="chat-sidebar">

            <div class="sidebar-header d-flex justify-content-between align-items-center">
                <h5>💬 Rooms</h5>
                <span id="room-count-badge" class="badge-room">0</span>
            </div>

            <div class="sidebar-body">

                <button id="create-room-sidebar" class="btn join-btn w-100 mb-3">
                    + Create Room
                </button>

                <p>Available Rooms</p>

                <select id="rooms-dropdown" class="form-control mb-3">
                    <option value="">Select Room</option>
                </select>

                <div>
                    Room ID: <strong id="current-room-id">—</strong>
                </div>

            </div>

            <div class="sidebar-footer mt-3">

                <div>
                    User: <span id="sidebar-username">—</span>
                </div>

                <button id="logout-sidebar" class="btn btn-sm logout-btn mt-2">
                    Logout
                </button>

            </div>

        </div>

        <!-- MAIN CHAT -->
        <div class="chat-main">

            <!-- HEADER WITH LOGOUT -->
            <div class="chat-header-main d-flex justify-content-between align-items-center">

                <div>
                    <h5 id="name-title" class="m-0">Chat</h5>
                    <small id="room-badge-display"></small>
                </div>

                <button id="logout" class="btn btn-sm logout-btn">
                    Logout
                </button>

            </div>

            <!-- MESSAGES -->
            <div class="chat-body-main">
                <table id="message-container-table" class="message-table"></table>
            </div>

            <!-- INPUT -->
            <div class="chat-footer-main">
                <div class="input-group">
                    <input type="text"
                           id="message-value"
                           class="form-control"
                           placeholder="Type message...">

                    <button id="send-btn" class="btn send-btn">
                        Send
                    </button>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
